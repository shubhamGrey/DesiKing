name: Deploy Next.js to Hostinger VPS

on:
  push:
    branches:
      - main
    paths:
      - "UI/**"
      - "docker-compose.yml"
      - "scripts/**"
      - ".github/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy project files to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          source: "docker-compose.yml,UI,scripts"
          target: "/var/www/agronexis"

      - name: Build and restart Next.js container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          command_timeout: 45m
          script: |
            set -e
            cd /var/www/agronexis

            chmod +x scripts/*.sh

            # Enable BuildKit for layer caching (faster npm install on repeat builds)
            export DOCKER_BUILDKIT=1

            # Ensure all services are running (no-op for already-running containers)
            docker compose up -d

            # Rebuild and restart only the nextjs container — leaves nginx, db, certbot untouched
            docker compose up -d --build --no-deps nextjs
